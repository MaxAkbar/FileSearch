name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  SOLUTION: FileSearch.slnx

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore .\${{ env.SOLUTION }}

      - name: Check formatting
        run: dotnet format .\${{ env.SOLUTION }} --verify-no-changes --no-restore

      - name: Build (Debug)
        run: dotnet build .\${{ env.SOLUTION }} --configuration Debug --no-restore

      - name: Test (Debug, with coverage)
        run: dotnet test .\${{ env.SOLUTION }} --configuration Debug --no-build --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"

      # Release runs with different JIT/optimization behavior; test it too so
      # a Release-only failure can't reach the publish step unnoticed.
      - name: Build (Release)
        run: dotnet build .\${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test .\${{ env.SOLUTION }} --configuration Release --no-build --logger trx --results-directory TestResults

      - name: CLI smoke test
        shell: pwsh
        run: |
          @(
            'path .\src\FileSearch.Cli'
            'help'
            'options'
            'limit 2'
            'search FileSearch'
            'index locations'
            'exit'
          ) | dotnet run --project .\src\FileSearch.Cli\FileSearch.Cli.csproj --configuration Debug --no-build

      - name: Published sidecar smoke test
        shell: pwsh
        run: |
          $publishDir = ".\artifacts\ci-publish\win-x64"
          if (Test-Path $publishDir) {
            Remove-Item -LiteralPath $publishDir -Recurse -Force
          }

          dotnet publish .\src\FileSearch.Gui\FileSearch.Gui.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -o $publishDir

          dotnet publish .\src\FileSearch.Indexer\FileSearch.Indexer.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -o $publishDir

          dotnet publish .\src\FileSearch.ExtractorHost\FileSearch.ExtractorHost.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -o $publishDir

          dotnet publish .\src\FileSearch.Cli\FileSearch.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -o $publishDir

          .\scripts\Test-PublishedSidecars.ps1 -PublishDirectory $publishDir

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload publish smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: filesearch-publish-smoke-win-x64
          path: artifacts/ci-publish/win-x64
          if-no-files-found: error
          retention-days: 7
