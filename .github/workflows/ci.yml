name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  SOLUTION: FileSearch.slnx

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\${{ env.SOLUTION }}

      - name: Build
        run: dotnet build .\${{ env.SOLUTION }} --configuration Debug --no-restore

      - name: Test
        run: dotnet test .\${{ env.SOLUTION }} --configuration Debug --no-build --logger trx --results-directory TestResults

      - name: CLI smoke test
        shell: pwsh
        run: |
          @(
            'path .\src\FileSearch.Cli'
            'help'
            'options'
            'limit 2'
            'search FileSearch'
            'index locations'
            'exit'
          ) | dotnet run --project .\src\FileSearch.Cli\FileSearch.Cli.csproj --configuration Debug --no-build

      - name: GUI publish smoke test
        shell: pwsh
        run: |
          dotnet publish .\src\FileSearch.Gui\FileSearch.Gui.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=portable `
            -p:DebugSymbols=true `
            -o .\artifacts\ci-publish\win-x64

          $helpIndex = ".\artifacts\ci-publish\win-x64\Help\index.html"
          if (-not (Test-Path $helpIndex)) {
            throw "Published help bundle missing: $helpIndex"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload publish smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: filesearch-gui-publish-smoke-win-x64
          path: artifacts/ci-publish/win-x64
          if-no-files-found: error
          retention-days: 7
